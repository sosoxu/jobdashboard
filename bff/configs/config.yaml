server:
  port: 18088

upstream:
  # jobServiceURL 仅作开发/测试回退；生产环境通过环境变量注入地址：
  #   RESTFULIP（或 JSF_SERVER）：作业监控服务 IP
  #   RESTFULPORT：作业监控服务端口（缺省 18080）
  # 环境变量设置后优先于本配置生效。
  jobServiceURL: "http://127.0.0.1:19000/job/call"
  timeoutSec: 10

sampler:
  enabled: true
  jsfIntervalSec: 60
  jobIntervalSec: 60
  jobPageSize: 500
  jobPageSleepMs: 100
  retainDays: 30

log:
  ngpEnv: "NGP"
  projectsConfRel: "configs/ndp/projects.conf"
  maxLogLines: 5000
  # 日志文件路径；为空则只输出到 stdout
  file: "./logs/bff.log"
  # 日志级别：debug/info/warn/error
  level: "info"
  # 单个日志文件最大 MB，超过则滚动切分
  maxSizeMB: 100
  # 保留的旧日志文件数量
  maxBackups: 7
  # 旧日志文件最大保留天数
  maxAgeDays: 30

ai:
  enabled: false
  provider: ""
  endpoint: ""
  apiKey: ""
  model: ""

storage:
  sqlitePath: "./data/dashboard.db"
