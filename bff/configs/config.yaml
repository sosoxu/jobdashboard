server:
  port: 18088

upstream:
  jobServiceURL: "http://130.1.100.152:18080/job/call"
  timeoutSec: 10

sampler:
  enabled: true
  jsfIntervalSec: 60
  jobIntervalSec: 60
  jobPageSize: 500
  jobPageSleepMs: 100
  retainDays: 30

log:
  ngpEnv: "NGP"
  projectsConfRel: "configs/ndp/projects.conf"
  maxLogLines: 5000
  # 日志文件路径；为空则只输出到 stdout
  file: "./logs/bff.log"
  # 日志级别：debug/info/warn/error
  level: "info"
  # 单个日志文件最大 MB，超过则滚动切分
  maxSizeMB: 100
  # 保留的旧日志文件数量
  maxBackups: 7
  # 旧日志文件最大保留天数
  maxAgeDays: 30

ai:
  enabled: false
  provider: ""
  endpoint: ""
  apiKey: ""
  model: ""

storage:
  sqlitePath: "./data/dashboard.db"
